name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Actionlint
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        run: bun install --frozen-lockfile --cwd ui

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck UI
        run: bun run --cwd ui typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: CI=true bun run test

      - name: Contract source
        run: CI=true bun run test:contract

      - name: Check version sync
        run: bun run check:version

      - name: Build
        run: bun run build

      - name: Smoke test sidecar daemon
        run: |
          set -euo pipefail

          ./dist/learn --version

          data_dir="$(mktemp -d)"
          port_file="${data_dir}/port"
          ./dist/learn daemon --data-dir "${data_dir}" --port-file "${port_file}" >"${data_dir}/daemon.out" 2>"${data_dir}/daemon.err" &
          daemon_pid="$!"

          cleanup() {
            if kill -0 "${daemon_pid}" 2>/dev/null; then
              kill "${daemon_pid}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for _attempt in {1..100}; do
            if [ -s "${port_file}" ] && [ -s "${data_dir}/daemon.json" ]; then
              break
            fi
            sleep 0.05
          done

          if [ ! -s "${port_file}" ] || [ ! -s "${data_dir}/daemon.json" ]; then
            cat "${data_dir}/daemon.err"
            cat "${data_dir}/daemon.out"
            exit 1
          fi

          port="$(cat "${port_file}")"
          token="$(bun -e 'const data = JSON.parse(await Bun.file(process.argv[1]).text()); console.log(data.token)' "${data_dir}/daemon.json")"
          curl -fsS -H "Authorization: Bearer ${token}" "http://127.0.0.1:${port}/api/health" >/dev/null
          curl -fsS -X POST -H "Authorization: Bearer ${token}" "http://127.0.0.1:${port}/api/shutdown" >/dev/null
          wait "${daemon_pid}"

  contract:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect contract changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            files="$(git show --format= --name-only HEAD)"
          else
            files="$(git diff --name-only "${base}" HEAD)"
          fi

          printf '%s\n' "${files}"

          if printf '%s\n' "${files}" | grep -Eq '^(src/|test/|scripts/|src-tauri/|instructions/|ui/|\.github/workflows/ci\.yml$)'; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip contract
        if: ${{ steps.changes.outputs.run != 'true' }}
        run: 'echo "Skipping contract tests: no daemon/UI/shell surface changes."'

      - name: Setup Bun
        if: ${{ steps.changes.outputs.run == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: bun install --frozen-lockfile

      - name: Build
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: bun run build

      - name: Copy sidecar
        if: ${{ steps.changes.outputs.run == 'true' }}
        env:
          TAURI_TARGET_TRIPLE: x86_64-unknown-linux-gnu
        run: bun run app:copy-sidecar

      - name: Run contract tests
        if: ${{ steps.changes.outputs.run == 'true' }}
        env:
          CI: "true"
          OVERLEARN_CONTRACT_RUNTIME: ${{ matrix.runtime }}
        run: bun run test:contract

  desktop-shell:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect desktop shell changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            files="$(git show --format= --name-only HEAD)"
          else
            files="$(git diff --name-only "${base}" HEAD)"
          fi

          printf '%s\n' "${files}"

          if printf '%s\n' "${files}" | grep -Eq '^src-tauri/'; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip desktop shell
        if: ${{ steps.changes.outputs.run != 'true' }}
        run: 'echo "Skipping desktop shell checks: no src-tauri changes."'

      - name: Install system dependencies
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Stub sidecar binary
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: |
          # tauri-build validates that the externalBin resource exists; the
          # real sidecar is only built in the release-artifacts workflow.
          mkdir -p src-tauri/bin
          touch src-tauri/bin/learn-x86_64-unknown-linux-gnu

      - name: Check desktop shell
        if: ${{ steps.changes.outputs.run == 'true' }}
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo check
          cargo test

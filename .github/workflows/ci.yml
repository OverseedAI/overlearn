name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Actionlint
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: CI=true bun run test

      - name: Build
        run: bun run build

      - name: Smoke test binary
        run: |
          ./dist/learn --version
          ./dist/learn instructions | head -30
          courses_dir="$(mktemp -d)"
          set +e
          OVERLEARN_COURSES_DIR="${courses_dir}" OVERLEARN_NO_BROWSER=1 ./dist/learn resume does-not-exist >"${courses_dir}/resume.out" 2>"${courses_dir}/resume.err"
          resume_exit="$?"
          set -e
          test "${resume_exit}" -eq 1
          grep -q 'Cannot resume course "does-not-exist"' "${courses_dir}/resume.err"
          grep -q "No available courses in ${courses_dir}" "${courses_dir}/resume.err"

  contract:
    needs: checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [binary, sidecar]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect contract changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            files="$(git show --format= --name-only HEAD)"
          else
            files="$(git diff --name-only "${base}" HEAD)"
          fi

          printf '%s\n' "${files}"

          if printf '%s\n' "${files}" | grep -Eq '^(src/|test/|scripts/|src-tauri/|instructions/|\.github/workflows/ci\.yml$)'; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip contract
        if: ${{ steps.changes.outputs.run != 'true' }}
        run: 'echo "Skipping contract tests: no daemon/UI/shell surface changes."'

      - name: Setup Bun
        if: ${{ steps.changes.outputs.run == 'true' }}
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: bun install --frozen-lockfile

      - name: Build
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: bun run build

      - name: Copy sidecar
        if: ${{ steps.changes.outputs.run == 'true' && matrix.runtime == 'sidecar' }}
        env:
          TAURI_TARGET_TRIPLE: x86_64-unknown-linux-gnu
        run: bun run app:copy-sidecar

      - name: Run contract tests
        if: ${{ steps.changes.outputs.run == 'true' }}
        env:
          CI: "true"
          OVERLEARN_CONTRACT_RUNTIME: ${{ matrix.runtime }}
        run: bun run test:contract

  desktop-shell:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Detect desktop shell changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi

          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            files="$(git show --format= --name-only HEAD)"
          else
            files="$(git diff --name-only "${base}" HEAD)"
          fi

          printf '%s\n' "${files}"

          if printf '%s\n' "${files}" | grep -Eq '^src-tauri/'; then
            echo "run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "run=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Skip desktop shell
        if: ${{ steps.changes.outputs.run != 'true' }}
        run: 'echo "Skipping desktop shell checks: no src-tauri changes."'

      - name: Install system dependencies
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - name: Setup Rust
        if: ${{ steps.changes.outputs.run == 'true' }}
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check desktop shell
        if: ${{ steps.changes.outputs.run == 'true' }}
        working-directory: src-tauri
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
          cargo check

  registry-it:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install registry dependencies
        working-directory: registry
        run: bun install

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run registry integration
        working-directory: registry
        run: bun run test

  registry-deploy:
    needs: registry-it
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install registry dependencies
        working-directory: registry
        run: bun install

      - name: Skip without Cloudflare secrets
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: 'echo "Skipping registry deploy: Cloudflare secrets are not set."'

      - name: Deploy registry Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: registry
        run: bun run deploy

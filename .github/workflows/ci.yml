name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Actionlint
        run: docker run --rm -v "${PWD}:/repo" -w /repo rhysd/actionlint:1.7.7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: CI=true bun run test

      - name: Build
        run: bun run build

      - name: Smoke test binary
        run: |
          ./dist/learn --version
          ./dist/learn instructions | head -30
          courses_dir="$(mktemp -d)"
          set +e
          OVERLEARN_COURSES_DIR="${courses_dir}" OVERLEARN_NO_BROWSER=1 ./dist/learn resume does-not-exist >"${courses_dir}/resume.out" 2>"${courses_dir}/resume.err"
          resume_exit="$?"
          set -e
          test "${resume_exit}" -eq 1
          grep -q 'Cannot resume course "does-not-exist"' "${courses_dir}/resume.err"
          grep -q "No available courses in ${courses_dir}" "${courses_dir}/resume.err"

  registry-it:
    needs: checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install registry dependencies
        working-directory: registry
        run: bun install

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run registry integration
        working-directory: registry
        run: bun run test

  registry-deploy:
    needs: registry-it
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install registry dependencies
        working-directory: registry
        run: bun install

      - name: Skip without Cloudflare secrets
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: 'echo "Skipping registry deploy: Cloudflare secrets are not set."'

      - name: Deploy registry Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        working-directory: registry
        run: bun run deploy

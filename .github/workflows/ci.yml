name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: CI=true bun test

      - name: Build
        run: bun run build

      - name: Smoke test binary
        run: |
          ./dist/learn --version
          ./dist/learn instructions | head -30

  agent-e2e:
    needs: checks
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Skip without Anthropic key
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "Skipping agent E2E: ANTHROPIC_API_KEY is not set."

      - name: Install Claude Code
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun add -g @anthropic-ai/claude-code@2.1.199

      - name: Run agent E2E
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun test/agent-e2e/run.ts

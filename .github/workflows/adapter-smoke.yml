name: Adapter Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adapter-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acp-real:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLAUDE_CODE_ACP_VERSION: "0.16.2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Require Anthropic key
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: |
          echo "::error::ANTHROPIC_API_KEY secret is required for adapter smoke."
          exit 1

      - name: Install pinned Claude Code ACP
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          set -euo pipefail

          smoke_dir="${RUNNER_TEMP}/claude-code-acp-smoke"
          mkdir -p "${smoke_dir}"
          cd "${smoke_dir}"

          cat > package.json <<JSON
          {
            "private": true,
            "type": "module",
            "devDependencies": {
              "@zed-industries/claude-code-acp": "${CLAUDE_CODE_ACP_VERSION}"
            }
          }
          JSON

          cat > bunfig.toml <<'EOF'
          [install]
          minimumReleaseAge = 604800
          EOF

          bun install
          echo "CLAUDE_CODE_ACP_BIN_DIR=${smoke_dir}/node_modules/.bin" >> "${GITHUB_ENV}"
          "${smoke_dir}/node_modules/.bin/claude-code-acp" --version

      - name: Run real ACP smoke
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun test/smoke/acp-real.ts

name: Agent E2E

# Live Claude sessions cost real API credits, so this gate runs only when the
# agent-facing surface changes, on manual dispatch, or weekly — not every push.
on:
  push:
    branches: [main]
    paths:
      - "plugin/**"
      - "instructions/**"
      - "test/agent-e2e/**"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: agent-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-e2e:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Skip without Anthropic key
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: 'echo "Skipping agent E2E: ANTHROPIC_API_KEY is not set."'

      - name: Install Claude Code
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun add -g @anthropic-ai/claude-code@2.1.199

      - name: Run agent E2E
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun test/agent-e2e/run.ts

      - name: Run resume agent E2E
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: bun test/agent-e2e/resume.ts

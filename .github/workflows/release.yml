name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Stamp package version
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION#v}"
          if [ -z "${version}" ] || [ "${version}" = "${RELEASE_VERSION}" ]; then
            echo "Release tag must start with v and include a semver version."
            exit 1
          fi

          # shellcheck disable=SC2016 # the single-quoted script is JavaScript for bun, not shell
          bun -e '
            const path = "package.json";
            const pkg = JSON.parse(await Bun.file(path).text());
            pkg.version = process.env.RELEASE_VERSION.slice(1);
            await Bun.write(path, `${JSON.stringify(pkg, null, 2)}\n`);
          '

      - name: Build release binaries
        run: |
          set -euo pipefail
          mkdir -p dist

          bun build --compile --target=bun-linux-x64 ./src/cli/index.ts --outfile dist/learn-linux-x64
          bun build --compile --target=bun-linux-arm64 ./src/cli/index.ts --outfile dist/learn-linux-arm64
          bun build --compile --target=bun-darwin-x64 ./src/cli/index.ts --outfile dist/learn-darwin-x64
          bun build --compile --target=bun-darwin-arm64 ./src/cli/index.ts --outfile dist/learn-darwin-arm64

      - name: Smoke test release binary
        run: ./dist/learn-linux-x64 --version

      - name: Generate checksums
        run: sha256sum dist/learn-* > SHA256SUMS

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/learn-* SHA256SUMS --generate-notes
